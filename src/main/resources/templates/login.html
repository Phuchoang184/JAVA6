<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Đăng nhập | LEIKA LUXURY</title>
</head>
<body>
<div th:fragment="content">

    <section class="min-h-[80vh] flex items-center justify-center py-20 bg-gray-50">
        <div class="w-full max-w-md mx-auto px-6">
            <div class="bg-white p-10 border border-gray-100">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-serif font-semibold tracking-wide mb-2">Đăng nhập</h1>
                    <div class="w-12 h-px bg-black mx-auto mb-4"></div>
                    <p class="text-sm text-gray-500">Chào mừng bạn quay trở lại LEIKA LUXURY</p>
                </div>

                <!-- v-pre prevents the parent #app Vue instance from compiling these directives -->
                <div id="loginApp" v-pre>
                    <!-- Error Message -->
                    <div v-if="errorMsg" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 text-sm rounded">
                        {{ errorMsg }}
                    </div>

                    <form @submit.prevent="handleLogin">
                        <div class="mb-6">
                            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Email</label>
                            <input v-model="email" type="email" required
                                   class="w-full border border-gray-300 px-4 py-3 text-sm focus:border-black focus:outline-none transition-colors"
                                   placeholder="email@example.com">
                        </div>

                        <div class="mb-6">
                            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Mật khẩu</label>
                            <input v-model="password" type="password" required
                                   class="w-full border border-gray-300 px-4 py-3 text-sm focus:border-black focus:outline-none transition-colors"
                                   placeholder="••••••••">
                        </div>

                        <button type="submit" :disabled="loading"
                                class="w-full btn-luxe-dark py-3 text-sm disabled:opacity-50">
                            <span v-if="!loading">ĐĂNG NHẬP</span>
                            <span v-else>Đang xử lý...</span>
                        </button>
                    </form>

                    <div class="mt-8 text-center text-sm text-gray-500">
                        Chưa có tài khoản?
                        <a href="/register" class="text-black font-medium hover:underline">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>
</body>
</html>
